    .test-row {

      padding: 6px 18px;

      border-bottom: 1px solid #1a1a2e;
    }

    .test-icon {
      font-size: 0.9rem;

      text-align: center;
      flex-shrink: 0;

    .test-icon.pass {
      color: #4ade80;
    }

    .test-name {

    }

      font-size: 0.75rem;
      font-family: monospace;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-bar-container {

      background: #1e1e2e;
      border-radius: 3px;

      height: 100%;
      border-radius: 3px;

    #run-btn {

      border: none;

      opacity: 0.5;
      cursor: not-allowed;
    }

  <script>
    // =========================================================================
    // V5 UTILITY FUNCTIONS (INLINED)
    // ==========================================
/**
 * V5 Utility Functions
 * Contains pure functions separated from DOM for testability.
 */

function formatDuration(sec) {
  if (isNaN(sec)) return "00:00:00";
  // Add a microscopic 1-nanosecond buffer (1e-9) before flooring.
  // This neutralizes IEEE 754 precision drift without causing clock jitter.
  sec = Math.max(0, Math.floor(sec + 1e-9));
  const h = Math.floor(sec / 3600).toString().padStart(2, "0");
  const m = Math.floor((sec % 3600) / 60).toString().padStart(2, "0");
  const s = Math.floor(sec % 60).toString().padStart(2, "0");
  return `${h}:${m}:${s}`;
}

function parseTime(str) {
  if (!str || typeof str !== "string") return null;
  const p = str.trim().split(":");
  let h = 0, m = 0, s = 0;
  if (p.length === 2) {
    h = parseInt(p[0], 10);
    m = parseInt(p[1], 10);
    if (isNaN(h) || isNaN(m) || h < 0 || m < 0) return null;
    return h * 3600 + m * 60;
  } else if (p.length === 3) {
    h = parseInt(p[0], 10);
    m = parseInt(p[1], 10);
    s = parseInt(p[2], 10);
    if (isNaN(h) || isNaN(m) || isNaN(s) || h < 0 || m < 0 || s < 0) return null;
    return h * 3600 + m * 60 + s;
  }
  return null;
}

function formatFriendlyDuration(sec, emptyPlaceholder = '<span style="opacity: 0.25; font-weight: 400;">-</span>') {
  if (sec === undefined || sec === null || sec <= 0) return emptyPlaceholder;
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) {
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  } else {
    if (m > 0) {
      return s > 0 ? `${m}m ${s}s` : `${m}m`;
    } else {
      return s > 0 ? `${s}s` : emptyPlaceholder;
    }
  }
}

function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>'"]/g, (tag) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "'": "&#39;",
    '"': "&quot;",
  })[tag] || tag);
}

function parseGoalTimeStr(val) {
  let hh = 0;
  let mm = 0;
  const cleanVal = String(val).trim().replace(",", ".");
  if (!cleanVal) return { hh: 8, mm: 0 };
  const naturalMatch = cleanVal.match(/^(?:(\d+(?:\.\d+)?)\s*h)?\s*(?:(\d+)\s*m)?$/i);
  const colonMatch = cleanVal.match(/^(\d+):(\d{1,2})$/);
  const decimalMatch = cleanVal.match(/^(\d+(?:\.\d+))$/);
  if (colonMatch) {
    hh = parseInt(colonMatch[1], 10);
    mm = parseInt(colonMatch[2], 10);
  } else if (decimalMatch) {
    const total = parseFloat(decimalMatch[1]);
    hh = Math.floor(total);
    mm = Math.round((total - hh) * 60);
  } else if (naturalMatch && (naturalMatch[1] || naturalMatch[2])) {
    const rawH = parseFloat(naturalMatch[1] || 0);
    hh = Math.floor(rawH);
    mm = Math.round((rawH - hh) * 60) + parseInt(naturalMatch[2] || 0, 10);
  } else {
    const digits = cleanVal.replace(/\D/g, "");
    if (digits) {
      if (digits.length <= 2) { hh = parseInt(digits, 10) || 0; mm = 0; }
      else if (digits.length === 3) { hh = parseInt(digits.slice(0, 1), 10) || 0; mm = parseInt(digits.slice(1), 10) || 0; }
      else { hh = parseInt(digits.slice(0, 2), 10) || 0; mm = parseInt(digits.slice(2, 4), 10) || 0; }
    } else { hh = 8; }
  }
  hh += Math.floor(mm / 60);
  mm = mm % 60;
  hh = Math.min(24, Math.max(0, hh));
  mm = Math.min(59, Math.max(0, mm));
  return { hh, mm };
}

function getGoalSeconds(h, m) {
  const hVal = Math.max(0, parseFloat(h) || 0);
  const mVal = Math.max(0, parseFloat(m) || 0);
  const total = hVal * 3600 + mVal * 60;
  return total > 0 ? total : 1;
}

function parseTimeToMinutes(timeStr) {
  if (!timeStr || timeStr === "Manual" || timeStr === "Entry" || timeStr === "—" || timeStr === "-") return null;
  const match = String(timeStr).match(/^(\d{2}):(\d{2})\s*(AM|PM)$/i);
  if (!match) return null;
  let hours = parseInt(match[1], 10);
  const minutes = parseInt(match[2], 10);
  const ampm = match[3].toUpperCase();
  if (ampm === "PM" && hours < 12) hours += 12;
  if (ampm === "AM" && hours === 12) hours = 0;
  return hours * 60 + minutes;
}

function debounce(func, wait) {
  let timeout;
  return function (...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

function hudFuzzyScore(query, target) {
  if (!query || !target) return 0;
  const q = String(query).toLowerCase();
  const t = String(target).toLowerCase();
  
  let qIdx = 0;
  let tIdx = 0;
  let score = 0;
  let consecutive = 0;
  
  while (qIdx < q.length && tIdx < t.length) {
    if (q[qIdx] === t[tIdx]) {
      score += 10;
      score += consecutive * 5; 
      
      if (tIdx === 0 || t[tIdx - 1] === ' ' || t[tIdx - 1] === '-') {
        score += 15;
      }
      
      consecutive++;
      qIdx++;
    } else {
      consecutive = 0;
      score -= 1; 
    }
    tIdx++;
  }
  
  if (qIdx < q.length) return 0; 
  
  if (t.includes(q)) score += 20;
  if (t === q) score += 50;
  
  return Math.max(0, score);
}

  <script>

    // =========================================================================
    // TEST HARNESS
    // =========================================================================
    const sections = [];
    let currentSection = null;

    let perfMultiplier = 1.0;
    let lcgSeed = 123456789;

    function lcg() {
      lcgSeed = (lcgSeed * 1664525 + 1013904223) % 4294967296;
      return lcgSeed / 4294967296;
    }

    function calibratePerformance() {
      const start = performance.now();
      let x = 0;
      for (let i = 0; i < 500000; i++) {
        x = (x + Math.sin(i)) % 1000;
      }
      const duration = performance.now() - start;
      // Standard VM benchmark completes 500k trig iterations in ~1.5ms.
      // Scaling allowed test budgets dynamically prevents false failures on slow CPUs.
      perfMultiplier = Math.max(1.0, duration / 1.5);
    }

    calibratePerformance();

    function describe(name, fn) {
      currentSection = { name, tests: [], pass: 0, fail: 0 };
      sections.push(currentSection);
      fn();
      currentSection = null;
    }

    function it(name, fn) {
      const test = { name, passed: false, detail: "" };
      try {
        fn();
        test.passed = true;
        currentSection.pass++;
      } catch (e) {
        test.detail = String(e.message || e).slice(0, 200);
        currentSection.fail++;
      }
      currentSection.tests.push(test);
    }

    function assert(condition, msg = "Assertion failed") {
      if (!condition) throw new Error(msg);
    }

    function assertEqual(actual, expected, msg) {
      if (actual !== expected) {
        throw new Error(`${msg || "assertEqual"}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
      }
    }

    function assertDeepEqual(actual, expected, msg) {
      if (JSON.stringify(actual) !== JSON.stringify(expected)) {
        throw new Error(`${msg || "assertDeepEqual"}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
      }
    }

    function assertThrows(fn, msg) {
      let threw = false;
      try { fn(); } catch (e) { threw = true; }
      if (!threw) throw new Error(msg || "Expected function to throw");
    }

    function assertApprox(actual, expected, tolerance, msg) {
      if (Math.abs(actual - expected) > tolerance) {
        throw new Error(`${msg || "assertApprox"}: expected ~${expected} ±${tolerance}, got ${actual}`);
      }
    }

    // =========================================================================
    // TEST SUITE DEFINITIONS
    // =========================================================================



    function defineV5Tests() {
      describe("hudFuzzyScore (V5 Feature)", () => {
        it("Exact match gets highest score", () => {
          const s1 = hudFuzzyScore("log", "log");
          assert(s1 >= 80, "Exact match should be >= 80");
        });
        it("Prefix match is scored high", () => {
          const s = hudFuzzyScore("log", "logbook");
          assert(s > 0, "Should match prefix");
        });
        it("Subsequence match works (fuzzy)", () => {
          const s = hudFuzzyScore("lb", "logbook");
          assert(s > 0, "Should match non-contiguous lb in logbook");
        });
        it("Acronym bonus works", () => {
          const s1 = hudFuzzyScore("hw", "hello world");
          const s2 = hudFuzzyScore("hw", "chowder");
          assert(s1 > s2, "Acronyms should score higher than inline matches");
        });
        it("Long string gap penalty doesn't cause negative return on valid match", () => {
          const target = "a" + "b".repeat(1000) + "c"; 
          const score = hudFuzzyScore("ac", target);
          assert(score >= 0, "Score should not drop below 0 if matched");
        });
        it("Missing character returns 0", () => {
          const score = hudFuzzyScore("logx", "logbook");
          assertEqual(score, 0, "Should return 0 if all chars not found");
        });
        it("Null/Empty inputs return 0", () => {
          assertEqual(hudFuzzyScore(null, "test"), 0);
          assertEqual(hudFuzzyScore("test", null), 0);
          assertEqual(hudFuzzyScore("", ""), 0);
        });
      });

      describe("Brutal Date Parsing & Formatting Overflows (V5)", () => {
         it("Extremely large goal seconds parsed safely", () => {
            const res = getGoalSeconds("9999", "9999");
            assert(!isNaN(res) && res > 0);
         });
         it("parseTime string edge cases", () => {
            assertEqual(parseTime(" 00 : 00 "), 0, "Spaces around colons are gracefully tolerated");
         });
      });

    }


    function defineAllTests() {
      defineV5Tests();

      // ═══════════════════════════════════════════════════════════════════════
      // 1. formatDuration — EXTREME EDGE CASES
      // ═══════════════════════════════════════════════════════════════════════
      describe("formatDuration", () => {
        it("0 seconds → 00:00:00", () => assertEqual(formatDuration(0), "00:00:00"));
        it("1 second → 00:00:01", () => assertEqual(formatDuration(1), "00:00:01"));
        it("59 seconds → 00:00:59", () => assertEqual(formatDuration(59), "00:00:59"));
        it("60 seconds → 00:01:00", () => assertEqual(formatDuration(60), "00:01:00"));
        it("61 seconds → 00:01:01", () => assertEqual(formatDuration(61), "00:01:01"));
        it("3599 seconds → 00:59:59", () => assertEqual(formatDuration(3599), "00:59:59"));
        it("3600 seconds → 01:00:00", () => assertEqual(formatDuration(3600), "01:00:00"));
        it("3661 seconds → 01:01:01", () => assertEqual(formatDuration(3661), "01:01:01"));
        it("8 hours → 08:00:00", () => assertEqual(formatDuration(28800), "08:00:00"));
        it("24 hours → 24:00:00", () => assertEqual(formatDuration(86400), "24:00:00"));
        it("100 hours → 100:00:00", () => assertEqual(formatDuration(360000), "100:00:00"));
        it("Negative input clamped to 0", () => assertEqual(formatDuration(-1), "00:00:00"));
        it("Large negative clamped to 0", () => assertEqual(formatDuration(-999999), "00:00:00"));
        it("Fractional seconds floored (1.9→1)", () => assertEqual(formatDuration(1.9), "00:00:01"));
        it("Fractional seconds floored (59.999→59)", () => assertEqual(formatDuration(59.999), "00:00:59"));
        it("NaN input → 00:00:00", () => assertEqual(formatDuration(NaN), "00:00:00"));
        it("Infinity input → huge but valid", () => {
          const r = formatDuration(Infinity);
          assert(typeof r === "string" && r.length > 0, "Should produce string");
        });
        it("Very large value (1M seconds)", () => {
          const r = formatDuration(1000000);
          assertEqual(r, "277:46:40");
        });
        it("MAX_SAFE_INTEGER doesnt crash", () => {
          const r = formatDuration(Number.MAX_SAFE_INTEGER);
          assert(typeof r === "string");
        });
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 2. parseTime — EXTREME EDGE CASES
      // ═══════════════════════════════════════════════════════════════════════
      describe("parseTime", () => {
        it("null input → null", () => assertEqual(parseTime(null), null));
        it("empty string → null", () => assertEqual(parseTime(""), null));
        it("undefined → null", () => assertEqual(parseTime(undefined), null));
        it("00:00 → 0", () => assertEqual(parseTime("00:00"), 0));
        it("01:00 → 3600", () => assertEqual(parseTime("01:00"), 3600));
        it("08:00 → 28800", () => assertEqual(parseTime("08:00"), 28800));
        it("23:59 → 86340", () => assertEqual(parseTime("23:59"), 86340));
        it("00:01 → 60", () => assertEqual(parseTime("00:01"), 60));
        it("HH:MM:SS format 01:30:45 → 5445", () => assertEqual(parseTime("01:30:45"), 5445));
        it("Leading whitespace trimmed", () => assertEqual(parseTime("  08:00  "), 28800));
        it("Invalid 'abc' → null", () => assertEqual(parseTime("abc"), null));
        it("Single number '5' → null", () => assertEqual(parseTime("5"), null));
        it("Colon only ':' → null (NaN check)", () => assertEqual(parseTime(":"), null));
        it("Double colon '::' → null", () => assertEqual(parseTime("::"), null));
        it("Extra colons '1:2:3:4' → null", () => assertEqual(parseTime("1:2:3:4"), null));
        it("Negative hours '-1:00' → NaN → null", () => assertEqual(parseTime("-1:00"), null));
        it("Zero hours zero mins 00:00:00 → 0", () => assertEqual(parseTime("00:00:00"), 0));
        it("99:99 → 99*3600 + 99*60 = 362340", () => assertEqual(parseTime("99:99"), 362340));
        it("Large HH:MM 999:59 → 3599940", () => assertEqual(parseTime("999:59"), 3599940));
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 3. formatFriendlyDuration — ALL BRANCHES
      // ═══════════════════════════════════════════════════════════════════════
      describe("formatFriendlyDuration", () => {
        it("0 → placeholder", () => assertEqual(formatFriendlyDuration(0), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
        it("null → placeholder", () => assertEqual(formatFriendlyDuration(null), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
        it("undefined → placeholder", () => assertEqual(formatFriendlyDuration(undefined), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
        it("Negative → placeholder", () => assertEqual(formatFriendlyDuration(-100), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
        it("Custom placeholder", () => assertEqual(formatFriendlyDuration(0, "N/A"), "N/A"));
        it("1 second → '1s'", () => assertEqual(formatFriendlyDuration(1), "1s"));
        it("59 seconds → '59s'", () => assertEqual(formatFriendlyDuration(59), "59s"));
        it("60 seconds → '1m'", () => assertEqual(formatFriendlyDuration(60), "1m"));
        it("61 seconds → '1m 1s'", () => assertEqual(formatFriendlyDuration(61), "1m 1s"));
        it("3599 seconds → '59m 59s'", () => assertEqual(formatFriendlyDuration(3599), "59m 59s"));
        it("3600 seconds → '1h'", () => assertEqual(formatFriendlyDuration(3600), "1h"));
        it("3601 seconds → '1h'", () => assertEqual(formatFriendlyDuration(3601), "1h"));
        it("3660 seconds → '1h 1m'", () => assertEqual(formatFriendlyDuration(3660), "1h 1m"));
        it("28800 seconds (8h) → '8h'", () => assertEqual(formatFriendlyDuration(28800), "8h"));
        it("28860 seconds (8h 1m) → '8h 1m'", () => assertEqual(formatFriendlyDuration(28860), "8h 1m"));
        it("86400 seconds (24h) → '24h'", () => assertEqual(formatFriendlyDuration(86400), "24h"));
        it("Fractional 1.5 seconds → '1s'", () => assertEqual(formatFriendlyDuration(1.5), "1s"));
        it("0.5 seconds → placeholder (floors to 0)", () => assertEqual(formatFriendlyDuration(0.5), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
        it("0.999 → placeholder", () => assertEqual(formatFriendlyDuration(0.999), '<span style="opacity: 0.25; font-weight: 400;">-</span>'));
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 4. escapeHTML — SECURITY EDGE CASES
      // ═══════════════════════════════════════════════════════════════════════
      describe("escapeHTML", () => {
        it("null → empty", () => assertEqual(escapeHTML(null), ""));
        it("undefined → empty", () => assertEqual(escapeHTML(undefined), ""));
        it("empty string → empty", () => assertEqual(escapeHTML(""), ""));
        it("No special chars → passthrough", () => assertEqual(escapeHTML("Hello World"), "Hello World"));
        it("Ampersand escaped", () => assertEqual(escapeHTML("a&b"), "a&amp;b"));
        it("Less-than escaped", () => assertEqual(escapeHTML("a<b"), "a&lt;b"));
        it("Greater-than escaped", () => assertEqual(escapeHTML("a>b"), "a&gt;b"));
        it("Single quote escaped", () => assertEqual(escapeHTML("a'b"), "a&#39;b"));
        it("Double quote escaped", () => assertEqual(escapeHTML('a"b'), "a&quot;b"));
        it("All special chars combined", () => {
          assertEqual(escapeHTML(`<script>alert("xss")<\/script>`), "&lt;script&gt;alert(&quot;xss&quot;)&lt;/script&gt;");
        });
        it("XSS injection vector neutralized", () => {
          const input = `<img src=x onerror="alert('pwned')">`;
          const result = escapeHTML(input);
          assert(!result.includes("<img"), "Should not contain raw HTML tag");
          // assert(!result.includes("onerror"), "onerror should not appear unescaped... wait it will since it's text");

      // ═══════════════════════════════════════════════════════════════════════
      // 11. WEEKLY CACHE & DATE MATH
      // ═══════════════════════════════════════════════════════════════════════
      describe("Weekly Cache & Date Math", () => {
        function getWeekStartMs(epochMs) {
          const daysSinceEpoch = Math.floor(epochMs / 86400000);
          const dayOfWeek = (daysSinceEpoch + 4) % 7;
          const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
          return ((daysSinceEpoch + diffToMonday) * 86400000) + 43200000;
        }

        it("Monday returns itself as week start", () => {
          const mon = Date.UTC(2026, 4, 25, 12, 0, 0); // May 25, 2026 = Monday
          const ws = getWeekStartMs(mon);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1); // Monday
        });

        it("Sunday maps to prior Monday", () => {
          const sun = Date.UTC(2026, 4, 31, 12, 0, 0); // May 31, 2026 = Sunday
          const ws = getWeekStartMs(sun);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1);
          assertEqual(d.getUTCDate(), 25);
        });

        it("Saturday maps to prior Monday", () => {
          const sat = Date.UTC(2026, 4, 30, 12, 0, 0); // May 30, 2026 = Saturday
          const ws = getWeekStartMs(sat);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1);
        });

        it("Friday maps to same week Monday", () => {
          const fri = Date.UTC(2026, 4, 29, 12, 0, 0); // May 29
          const ws = getWeekStartMs(fri);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1);
          assertEqual(d.getUTCDate(), 25);
        });

        it("Cross-month boundary (Apr 30 → May 4)", () => {
          const wed = Date.UTC(2026, 3, 29, 12, 0, 0); // Apr 29, Wed
          const ws = getWeekStartMs(wed);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1);
        });

        it("Cross-year boundary (Dec 31 → Jan 4)", () => {
          const thu = Date.UTC(2026, 0, 1, 12, 0, 0); // Jan 1, Thu
          const ws = getWeekStartMs(thu);
          const d = new Date(ws);
          assertEqual(d.getUTCDay(), 1);
        });

        it("All 7 days of same week produce same Monday key", () => {
          const baseMonday = Date.UTC(2026, 4, 25, 12, 0, 0);
          const keys = new Set();
          for (let i = 0; i < 7; i++) {
            keys.add(getWeekStartMs(baseMonday + i * 86400000));
          }
          assertEqual(keys.size, 1);
        });

        it("Two consecutive weeks produce different keys", () => {
          const w1 = getWeekStartMs(Date.UTC(2026, 4, 25, 12, 0, 0));
          const w2 = getWeekStartMs(Date.UTC(2026, 5, 1, 12, 0, 0));
          assert(w1 !== w2);
        });

        it("dataVersion increment uniquely identifies cache invalidations", () => {
          let dataVersion = 0;
          const weekStartMs = getWeekStartMs(Date.UTC(2026, 4, 25, 12, 0, 0));
          const todayStr = "05/25/26";
          
          const iKey1 = `${weekStartMs}|${todayStr}|${dataVersion}`;
          dataVersion++; // Simulate mutation
          const iKey2 = `${weekStartMs}|${todayStr}|${dataVersion}`;
          
          assert(iKey1 !== iKey2, "Incremented dataVersion should produce unique cache key");
        });
      });

      // 12. FILTER LOGIC (SIMULATED)
      // ═══════════════════════════════════════════════════════════════════════
      describe("Filter Logic", () => {
        function mockFilter(logs, opts = {}) {
          const { status = "ALL", hasNotes = false, hoursOp = "ALL", hoursVal = 0, searchVal = "" } = opts;
          return logs.filter(l => {
            const matchStatus = status === "ALL" || l.status === status;
            const matchNotes = !hasNotes || (l.notes && l.notes.trim() !== "");
            let matchHours = true;
            if (hoursOp !== "ALL") {
              const wHours = l.workSec / 3600;
              if (hoursOp === "MORE") matchHours = wHours >= hoursVal;
              if (hoursOp === "LESS") matchHours = wHours <= hoursVal;
            }
            let matchSearch = true;
            if (searchVal && l.searchStr) {
              matchSearch = l.searchStr.includes(searchVal.toLowerCase());
            }
            return matchStatus && matchNotes && matchHours && matchSearch;
          });
        }

        const sampleLogs = [
          { id: "1", status: "OVER", workSec: 32400, notes: "Meeting", searchStr: "05/01/26 meeting" },
          { id: "2", status: "UNDER", workSec: 25200, notes: "", searchStr: "05/02/26" },
          { id: "3", status: "OVER", workSec: 28800, notes: "Review", searchStr: "05/03/26 review" },
          { id: "4", status: "UNDER", workSec: 14400, notes: "Half day", searchStr: "05/04/26 half day" },
          { id: "5", status: "OVER", workSec: 36000, notes: "", searchStr: "05/05/26" },
        ];

        it("No filters returns all", () => assertEqual(mockFilter(sampleLogs).length, 5));
        it("Filter OVER status", () => assertEqual(mockFilter(sampleLogs, { status: "OVER" }).length, 3));
        it("Filter UNDER status", () => assertEqual(mockFilter(sampleLogs, { status: "UNDER" }).length, 2));
        it("Filter hasNotes", () => assertEqual(mockFilter(sampleLogs, { hasNotes: true }).length, 3));
        it("Filter hours MORE than 8h", () => assertEqual(mockFilter(sampleLogs, { hoursOp: "MORE", hoursVal: 8 }).length, 3));
        it("Filter hours LESS than 6h", () => assertEqual(mockFilter(sampleLogs, { hoursOp: "LESS", hoursVal: 6 }).length, 1));
        it("Filter hours MORE than 100h → 0", () => assertEqual(mockFilter(sampleLogs, { hoursOp: "MORE", hoursVal: 100 }).length, 0));
        it("Filter hours LESS than 0h → 0", () => assertEqual(mockFilter(sampleLogs, { hoursOp: "LESS", hoursVal: 0 }).length, 0));
        it("Search 'meeting'", () => assertEqual(mockFilter(sampleLogs, { searchVal: "meeting" }).length, 1));
        it("Search case insensitive 'REVIEW'", () => assertEqual(mockFilter(sampleLogs, { searchVal: "REVIEW" }).length, 1));
        it("Search no match", () => assertEqual(mockFilter(sampleLogs, { searchVal: "zzzzz" }).length, 0));
        it("Combined: OVER + hasNotes", () => assertEqual(mockFilter(sampleLogs, { status: "OVER", hasNotes: true }).length, 2));
        it("Combined: UNDER + search 'half'", () => assertEqual(mockFilter(sampleLogs, { status: "UNDER", searchVal: "half" }).length, 1));
        it("Empty logs array → empty result", () => assertEqual(mockFilter([]).length, 0));
      });

          assert(activeDate !== currentDate, "Should trigger rollover");

        it("Month boundary rollover (05/31 → 06/01)", () => {
          const [m, d, y] = "05/31/26".split("/");
          const nextDay = new Date(Date.UTC(parseInt("20" + y), parseInt(m) - 1, parseInt(d) + 1, 12));
          assertEqual(nextDay.getUTCMonth() + 1, 6);
          assertEqual(nextDay.getUTCDate(), 1);
        });

        it("Year boundary rollover (12/31 → 01/01)", () => {
          const [m, d, y] = "12/31/25".split("/");
          const nextDay = new Date(Date.UTC(parseInt("20" + y), parseInt(m) - 1, parseInt(d) + 1, 12));
          assertEqual(nextDay.getUTCMonth() + 1, 1);
          assertEqual(nextDay.getUTCDate(), 1);
          assertEqual(nextDay.getUTCFullYear(), 2026);
        });

        it("Feb 28 non-leap → Mar 1", () => {
          const nextDay = new Date(Date.UTC(2025, 1, 28 + 1, 12));
          assertEqual(nextDay.getUTCMonth() + 1, 3);
          assertEqual(nextDay.getUTCDate(), 1);
        });

        it("Feb 28 leap year → Feb 29", () => {
          const nextDay = new Date(Date.UTC(2024, 1, 28 + 1, 12));
          assertEqual(nextDay.getUTCMonth() + 1, 2);
          assertEqual(nextDay.getUTCDate(), 29);
        });

        it("Feb 29 leap year → Mar 1", () => {
          const nextDay = new Date(Date.UTC(2024, 1, 29 + 1, 12));
          assertEqual(nextDay.getUTCMonth() + 1, 3);
          assertEqual(nextDay.getUTCDate(), 1);
        });

        it("Multi-day gap (3 days) iterates correctly", () => {
          let activeDate = "05/25/26";
          const targetDate = "05/28/26";
          let iterations = 0;
          while (activeDate !== targetDate && iterations < 31) {
            const [m, d, y] = activeDate.split("/");
            const nextDay = new Date(Date.UTC(parseInt("20" + y), parseInt(m) - 1, parseInt(d) + 1, 12));
            const nm = String(nextDay.getUTCMonth() + 1).padStart(2, "0");
            const nd = String(nextDay.getUTCDate()).padStart(2, "0");
            const ny = String(nextDay.getUTCFullYear()).slice(-2);
            activeDate = `${nm}/${nd}/${ny}`;
            iterations++;
          }
          assertEqual(iterations, 3);
          assertEqual(activeDate, "05/28/26");
        });

        it("Safety counter prevents infinite loop (31 max)", () => {
          let counter = 0;
          const maxIterations = 31;
          while (counter < maxIterations + 5) {
            counter++;
            if (counter >= maxIterations) break;
          }
          assertEqual(counter, 31);
        });

        it("Clock rollback protection", () => {

          const curEpoch = Date.UTC(2000 + curY, curM - 1, curD);
          assert(actEpoch > curEpoch, "Active date is in the future — rollback detected");
        });

      describe("Engine Precision & Clock Drift", () => {
        function simulateEngineTick(anchor, now) {

          return Math.max(0, (now - anchor) / 1000);
        }

          const anchor = 1716800000000; // Deterministic static timestamp

        });

          // Simulate 10 ticks where the browser lags and fires every 1.1s instead of 1.0s
          for (let i = 0; i < 10; i++) {
            relativeCounter += 1;
          }
          const relativeResult = relativeCounter; // Gives 10 seconds

          // V2's absolute engine result
          const actualNow = 5000000 + 10 * 1100;
          const v2Result = simulateEngineTick(anchor, actualNow);

          assert(

          );

            "V2 absolute engine captured the 11 seconds"

      // ═══════════════════════════════════════════════════════════════════════
      // 29. DUAL-CLOCK DRIFT CORRECTION ENGINE (V2's exact tick() logic)
      // ═══════════════════════════════════════════════════════════════════════
      describe("Dual-Clock Drift Correction Engine", () => {
        // Exact replica of V2's drift detection from tick() lines 9362-9391
        function simulateDriftDetection(lastWall, lastMono, nowWall, nowMono) {
          const wallDelta = nowWall - lastWall; // UNCLAMPED — allows negative for backward NTP
          const monoDelta = Math.max(0, nowMono - lastMono);
          const discrepancy = Math.abs(wallDelta - monoDelta);
          const DEADZONE = 5000;
          const SLEEP_THRESHOLD = 30000;

          if (discrepancy > DEADZONE) {
            if (monoDelta < wallDelta - SLEEP_THRESHOLD) {
              return { action: "IDLE_LOCK", reason: "OS_SLEEP", wallDelta, monoDelta, discrepancy };
            } else {
              // NTP drift — anchor shift needed
              const anchorShift = wallDelta - monoDelta;
              return { action: "ANCHOR_SHIFT", anchorShift, wallDelta, monoDelta, discrepancy };
            }
          }
          return { action: "NONE", wallDelta, monoDelta, discrepancy };
        }

        // === FORWARD NTP JUMPS ===

        it("Small NTP forward jump (2s) → inside deadzone → NONE", () => {
          const r = simulateDriftDetection(1000000, 50000, 1012000, 62000);
          // wall=12s, mono=12s, discrepancy=0 → NONE
          assertEqual(r.action, "NONE");
        });

        it("NTP forward jump exactly at 5s deadzone → NONE", () => {
          // wall jumps 15s but mono only 10s → discrepancy=5000 → NOT > 5000 → NONE
          const r = simulateDriftDetection(1000000, 50000, 1015000, 60000);
          assertEqual(r.action, "NONE");
        });

        it("NTP forward jump 6s past deadzone → ANCHOR_SHIFT", () => {
          // wall=16s, mono=10s → discrepancy=6000 > 5000
          // monoDelta(10000) NOT < wallDelta(16000) - 30000 = -14000 → ANCHOR_SHIFT
          const r = simulateDriftDetection(1000000, 50000, 1016000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, 6000); // wallDelta - monoDelta = 16000 - 10000
        });

        it("NTP forward jump 20s → ANCHOR_SHIFT (not sleep)", () => {
          // wall=30s, mono=10s → discrepancy=20000
          // monoDelta(10000) NOT < wallDelta(30000) - 30000 = 0 → ANCHOR_SHIFT
          const r = simulateDriftDetection(1000000, 50000, 1030000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, 20000);
        });

        it("NTP forward jump 29s → still ANCHOR_SHIFT (boundary)", () => {
          // wall=39s, mono=10s → discrepancy=29000
          // monoDelta(10000) NOT < wallDelta(39000) - 30000 = 9000 → FALSE → ANCHOR_SHIFT
          const r = simulateDriftDetection(1000000, 50000, 1039000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
        });

        // === OS SLEEP DETECTION ===

        it("OS Sleep: wall jumps 2 minutes, mono frozen → IDLE_LOCK", () => {
          // wall=120s, mono=0.1s → discrepancy=119900
          // monoDelta(100) < wallDelta(120000) - 30000 = 90000 → TRUE → IDLE_LOCK
          const r = simulateDriftDetection(1000000, 50000, 1120000, 50100);
          assertEqual(r.action, "IDLE_LOCK");
          assertEqual(r.reason, "OS_SLEEP");
        });

        it("OS Sleep: wall jumps 1 hour, mono frozen → IDLE_LOCK", () => {
          const r = simulateDriftDetection(1000000, 50000, 4600000, 50050);
          assertEqual(r.action, "IDLE_LOCK");
          assertEqual(r.reason, "OS_SLEEP");
        });

        it("OS Sleep: wall jumps 8 hours, mono frozen → IDLE_LOCK", () => {
          const r = simulateDriftDetection(1000000, 50000, 29800000, 50010);
          assertEqual(r.action, "IDLE_LOCK");
          assertEqual(r.reason, "OS_SLEEP");
        });

        it("OS Sleep: wall jumps 3 days, mono frozen → IDLE_LOCK", () => {
          const r = simulateDriftDetection(1000000, 50000, 260200000, 50001);
          assertEqual(r.action, "IDLE_LOCK");
        });

        it("OS Sleep threshold boundary: wall=40s mono=10s → monoDelta(10000) < wallDelta(40000)-30000=10000 → FALSE → ANCHOR_SHIFT", () => {
          const r = simulateDriftDetection(1000000, 50000, 1040000, 60000);
          // monoDelta=10000, wallDelta-30000=10000, 10000 < 10000 is FALSE → ANCHOR_SHIFT
          assertEqual(r.action, "ANCHOR_SHIFT");
        });

        it("OS Sleep threshold: wall=41s mono=10s → monoDelta(10000) < 11000 → TRUE → IDLE_LOCK", () => {
          const r = simulateDriftDetection(1000000, 50000, 1041000, 60000);
          assertEqual(r.action, "IDLE_LOCK");
        });

        // === BACKWARD NTP JUMPS (system clock set back) ===

        it("Backward NTP jump 10s → wallDelta negative → ANCHOR_SHIFT with negative shift", () => {
          // Wall goes BACK by 10s: lastWall=1000000, nowWall=990000
          // wallDelta = -10000, monoDelta = 10000, discrepancy = 20000 > 5000
          // monoDelta(10000) NOT < wallDelta(-10000) - 30000 = -40000 → ANCHOR_SHIFT
          const r = simulateDriftDetection(1000000, 50000, 990000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, -20000); // wallDelta(-10000) - monoDelta(10000)
        });

        it("Backward NTP jump 30s → negative anchor shift", () => {
          const r = simulateDriftDetection(1000000, 50000, 970000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, -40000);
        });

        it("Backward NTP jump 2 minutes → large negative shift", () => {
          const r = simulateDriftDetection(1000000, 50000, 880000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, -130000);
        });

        it("Backward NTP jump 1 hour → extreme negative shift", () => {
          // Wall goes back 3600s, mono advances 10s
          const r = simulateDriftDetection(1000000, 50000, 1000000 - 3600000, 60000);
          assertEqual(r.action, "ANCHOR_SHIFT");
          assertEqual(r.anchorShift, -3610000);
        });

        // === ANCHOR SHIFT APPLICATION ===

        it("Anchor shift preserves accumulated work exactly", () => {
          const sessionAnchor = 1000000;
          const workBefore = (1050000 - sessionAnchor) / 1000; // 50 seconds before drift

          // NTP jumps forward 8s (mono only advanced 2s)
          const anchorShift = 8000 - 2000; // 6000ms
          const newAnchor = sessionAnchor + anchorShift;

          // After anchor shift, re-calculate work from the new anchor
          const workAfter = (1050000 - newAnchor) / 1000;
          // The 6s NTP jump is absorbed into the anchor, so work shrinks by 6s
          assertApprox(workBefore - workAfter, 6, 0.01);
        });

        it("Backward anchor shift ADDS time (correctly compensates clock rollback)", () => {
          const sessionAnchor = 1000000;
          const nowMs = 1050000;
          const workBefore = (nowMs - sessionAnchor) / 1000; // 50s

          // Clock goes back 10s → anchorShift = -10000
          const newAnchor = sessionAnchor + (-10000);
          const workAfter = (nowMs - newAnchor) / 1000; // 60s
          assertEqual(workAfter, 60);
          assertEqual(workAfter - workBefore, 10);
        });
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 30. SYSTEM TIME SKIP SCENARIOS (end-to-end state simulation)
      // ═══════════════════════════════════════════════════════════════════════
      describe("System Time Skip Scenarios (E2E State)", () => {
        function createActiveState(overrides = {}) {
          const now = Date.now();
          return {
            workAccumulated: 0, breakAccumulated: 0,
            currentMode: "work",
            sessionAnchorWall: now - 60000, // started 1 min ago
            loginTimestamp: now - 60000,
            activeDate: "05/27/26",
            idleLock: false, idleStart: null, preIdleMode: null,
            lastHeartbeatWall: now - 1000,
            lastHeartbeatMonotonic: performance.now() - 1000,
            idleTrackingEnabled: true, idleThresholdMinutes: 60,
            trackingMode: "intelligent",
            ...overrides,
          };
        }

        function simulateFullTick(state, nowWall, nowMono) {
          const lastWall = state.lastHeartbeatWall || nowWall;
          const lastMono = state.lastHeartbeatMonotonic || nowMono;
          const wallDelta = nowWall - lastWall;
          const monoDelta = Math.max(0, nowMono - lastMono);
          const discrepancy = Math.abs(wallDelta - monoDelta);
          const events = [];

          if (state.trackingMode === "intelligent" && state.currentMode !== null && !state.idleLock) {
            if (discrepancy > 5000) {
              if (monoDelta < wallDelta - 30000) {
                state.preIdleMode = state.currentMode;
                state.currentMode = null;
                state.idleLock = true;
                state.idleStart = lastWall;
                events.push("IDLE_LOCK:OS_SLEEP");
              } else if (state.sessionAnchorWall !== null) {
                state.sessionAnchorWall += wallDelta - monoDelta;
                events.push("ANCHOR_SHIFTED:" + (wallDelta - monoDelta));
              }
            }
            if (!state.idleLock) {
              state.lastHeartbeatWall = nowWall;
              state.lastHeartbeatMonotonic = nowMono;
            }
          }

          // Compute current work
          let workSec = state.workAccumulated;
          if (state.currentMode === "work" && !state.idleLock && state.sessionAnchorWall !== null) {
            workSec += Math.max(0, (nowWall - state.sessionAnchorWall) / 1000);
          }
          return { events, workSec };
        }

        it("Normal tick: 10s elapsed, no drift → work = anchor elapsed", () => {
          const base = Date.now();
          const s = createActiveState({
            sessionAnchorWall: base - 100000,
            lastHeartbeatWall: base - 1000,
            lastHeartbeatMonotonic: 50000,
          });
          const r = simulateFullTick(s, base, 51000);
          assertEqual(r.events.length, 0);
          assertApprox(r.workSec, 100, 1);
        });

        it("Forward NTP jump +30s during work → anchor shifts, work stays correct", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 600000, // 10 min of work
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
          });
          // 10s of real time passes, but NTP jumps wall clock forward 30s
          const r = simulateFullTick(s, base + 40000, 110000);
          // discrepancy = |40000 - 10000| = 30000 > 5000
          // monoDelta(10000) < wallDelta(40000) - 30000 = 10000? NO → ANCHOR_SHIFT
          assert(r.events[0].startsWith("ANCHOR_SHIFTED:"), "Should shift anchor");
          // Anchor shifted by +30000, so session start effectively moved forward
          assertEqual(s.sessionAnchorWall, (base - 600000) + 30000);
        });

        it("Backward NTP jump -20s during work → anchor shifts backward, preserves real elapsed", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 300000,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
          });
          // 10s real time, but wall goes BACK 20s
          const r = simulateFullTick(s, base - 10000, 110000);
          // wallDelta = -10000, monoDelta = 10000, discrepancy = 20000
          assert(r.events[0].startsWith("ANCHOR_SHIFTED:"), "Should shift anchor");
          assertEqual(s.sessionAnchorWall, (base - 300000) + (-10000 - 10000));
        });

        it("OS Sleep 5 minutes → triggers idle lock at heartbeat timestamp", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 60000,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
          });
          // Wall jumps 5 min, mono frozen
          const r = simulateFullTick(s, base + 300000, 100100);
          assertEqual(r.events[0], "IDLE_LOCK:OS_SLEEP");
          assertEqual(s.idleLock, true);
          assertEqual(s.preIdleMode, "work");
          assertEqual(s.idleStart, base); // Frozen at last heartbeat
          assertEqual(s.currentMode, null);
        });

        it("OS Sleep overnight (8 hours) → idle lock, work frozen at pre-sleep amount", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 3600000, // 1h of work before sleep
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
          });
          const r = simulateFullTick(s, base + 28800000, 100050);
          assertEqual(r.events[0], "IDLE_LOCK:OS_SLEEP");
          // Work should NOT include the 8h of sleep — it's frozen at pre-lock state
          assertEqual(r.workSec, 0); // currentMode is now null due to lock
        });

        it("Simple mode ignores drift entirely — no anchor shift or idle lock", () => {
          const base = 2000000;
          const s = createActiveState({
            trackingMode: "simple",
            sessionAnchorWall: base - 600000,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
          });
          // Forward NTP jump 60s
          const r = simulateFullTick(s, base + 70000, 110000);
          assertEqual(r.events.length, 0);
          // Work includes the full NTP-inflated time (simple mode trusts wall clock)
          assertApprox(r.workSec, 670, 1);
        });

        it("Break mode: drift detection runs but accumulates to break, not work", () => {
          const base = 2000000;
          const s = createActiveState({
            currentMode: "break",
            sessionAnchorWall: base - 60000,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
          });
          // OS Sleep
          const r = simulateFullTick(s, base + 300000, 100050);
          assertEqual(r.events[0], "IDLE_LOCK:OS_SLEEP");
          assertEqual(s.preIdleMode, "break");
          assertEqual(r.workSec, 0); // No work accumulated
        });

        it("Rapid clock oscillation: +8s, -6s, +10s, -3s → all shifts compound correctly", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 100000,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
          });
          const originalAnchor = s.sessionAnchorWall;

          // Tick 1: +8s NTP, 2s real
          simulateFullTick(s, base + 10000, 102000); // wall=10s, mono=2s, disc=8000, shift=+8000

          // Tick 2: -6s NTP, 2s real
          simulateFullTick(s, base + 10000 - 6000 + 2000, 104000); // from last heartbeat

          // After compound shifts, the anchor should have moved by net of all shifts
          const totalShift = s.sessionAnchorWall - originalAnchor;
          assert(typeof totalShift === "number" && !isNaN(totalShift));
        });

        it("Intelligent mode arms warp detection on tick #1 (Heartbeat Init)", () => {
          const base = 2000000;
          // Simulate the exact state right after switchMode("work") runs with the fix applied
          const s = createActiveState({
            sessionAnchorWall: base,
            loginTimestamp: base,
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
            trackingMode: "intelligent"
          });

          // Tick 1 fires 1 second later, but OS time jumped 5 minutes
          const r = simulateFullTick(s, base + 301000, 101000);

          // Should trigger IDLE_LOCK instantly because discrepancy > 5000 and monoDelta < wallDelta - 30000
          assertEqual(r.events[0], "IDLE_LOCK:OS_SLEEP", "Warp detection failed on tick #1");
          assertEqual(s.idleLock, true);
        });

        it("Time Warp during Grace Period (First 60s) triggers lock correctly", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base - 20000, // 20 seconds into session (grace period)
            lastHeartbeatWall: base,
            lastHeartbeatMonotonic: 100000,
            workAccumulated: 0,
            trackingMode: "intelligent"
          });

          // Wall clock jumps 5 minutes, mono jumps 1 second
          const r = simulateFullTick(s, base + 301000, 101000);

          assertEqual(r.events[0], "IDLE_LOCK:OS_SLEEP", "Lock suppressed during grace period");
          assertEqual(s.idleLock, true);
        });

        it("Simple Mode ignores 5-minute jump on tick #1", () => {
          const base = 2000000;
          const s = createActiveState({
            sessionAnchorWall: base,
            loginTimestamp: base,
            lastHeartbeatWall: null, // Simple mode doesn't init heartbeats
            lastHeartbeatMonotonic: null,
            workAccumulated: 0,
            trackingMode: "simple"
          });

          const r = simulateFullTick(s, base + 301000, 101000);

          assertEqual(r.events.length, 0, "Simple mode fired an event");
          assertEqual(s.idleLock, false);
          assertApprox(r.workSec, 301, 1, "Simple mode failed to absorb the jumped time");
        });
      });

      // 31. MIDNIGHT BOUNDARY DURING TIME JUMPS
      // ═══════════════════════════════════════════════════════════════════════
      describe("Midnight Boundary During Time Jumps", () => {
        it("Clock jump crosses midnight → rollover triggers", () => {

          const currentDate = "05/28/26"; // Wall clock jumped past midnight
          assert(activeDate !== currentDate, "Rollover should trigger");
        });

        it("Clock jump crosses 3 midnights → 3 iterations", () => {
          let activeDate = "05/25/26";
          const targetDate = "05/28/26";
          let iterations = 0;
          while (activeDate !== targetDate && iterations < 31) {
            const [m, d, y] = activeDate.split("/");
            const nextDay = new Date(Date.UTC(parseInt("20" + y), parseInt(m) - 1, parseInt(d) + 1, 12));
            const nm = String(nextDay.getUTCMonth() + 1).padStart(2, "0");
            const nd = String(nextDay.getUTCDate()).padStart(2, "0");
            const ny = String(nextDay.getUTCFullYear()).slice(-2);

          }

        it("Clock BACKWARD jump → rollback protection realigns", () => {

          const actEpoch = Date.UTC(2000 + actY, actM - 1, actD);

        it("Clock forward jump 31 days → safety counter caps at 31 iterations", () => {

            const nm = String(nextDay.getUTCMonth() + 1).padStart(2, "0");

        it("Midnight boundary math: work capped exactly at midnight", () => {
          // Session started at 11:30 PM, clock jumps to 12:30 AM next day

          const midnightPST = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 7, 0, 0); // Midnight PST
          const sessionStart = midnightPST - 1800000; // 11:30 PM PST = 30 mins before midnight

          const workToMidnight = Math.max(0, (midnightPST - sessionStart) / 1000);

      // ═══════════════════════════════════════════════════════════════════════
      // 33. EXTREME TIME WARP STRESS TEST
      // ═══════════════════════════════════════════════════════════════════════
      describe("Extreme Time Warp Stress Test", () => {
        function simulateDrift(lastWall, lastMono, nowWall, nowMono) {
          const wallDelta = nowWall - lastWall;
          const monoDelta = Math.max(0, nowMono - lastMono);
          const discrepancy = Math.abs(wallDelta - monoDelta);
          if (discrepancy <= 5000) return "NONE";
          if (monoDelta < wallDelta - 30000) return "IDLE_LOCK";
          return "ANCHOR_SHIFT";
        }

        it("1000 random forward NTP jumps all produce valid results", () => {
          for (let i = 0; i < 1000; i++) {
            const jump = Math.floor(Math.random() * 100000); // 0-100s jump
            const real = Math.floor(Math.random() * 10000); // 0-10s real
            const r = simulateDrift(0, 0, jump, real);
            assert(["NONE", "IDLE_LOCK", "ANCHOR_SHIFT"].includes(r), `Invalid result: ${r}`);
          }
        });

        it("1000 random backward NTP jumps all produce valid results", () => {
          for (let i = 0; i < 1000; i++) {
            const jump = -Math.floor(Math.random() * 100000); // negative
            const real = Math.floor(Math.random() * 10000);
            const r = simulateDrift(100000, 0, 100000 + jump, real);
            assert(["NONE", "IDLE_LOCK", "ANCHOR_SHIFT"].includes(r));
          }
        });

        it("Clock jumps forward 1 year → IDLE_LOCK (not crash)", () => {
          const yearMs = 365.25 * 86400 * 1000;
          const r = simulateDrift(0, 0, yearMs, 100);
          assertEqual(r, "IDLE_LOCK");
        });

        it("Clock jumps backward 1 year → ANCHOR_SHIFT (not crash)", () => {
          const yearMs = 365.25 * 86400 * 1000;
          const r = simulateDrift(yearMs, 0, 0, 100);
          assertEqual(r, "ANCHOR_SHIFT");
        });

        it("Clock jumps forward 100 years → still IDLE_LOCK", () => {
          const r = simulateDrift(0, 0, 100 * 365.25 * 86400000, 1);
          assertEqual(r, "IDLE_LOCK");
        });

        it("Both clocks at 0 → NONE", () => {
          const r = simulateDrift(0, 0, 0, 0);
          assertEqual(r, "NONE");
        });

        it("Both clocks at MAX_SAFE_INTEGER → NONE", () => {
          const big = Number.MAX_SAFE_INTEGER;
          const r = simulateDrift(big, big, big, big);
          assertEqual(r, "NONE");
        });

        it("Wall at 0, mono at MAX → ANCHOR_SHIFT", () => {
          const r = simulateDrift(0, 0, 0, Number.MAX_SAFE_INTEGER);
          assertEqual(r, "ANCHOR_SHIFT");
        });

        it("Alternating forward/backward 500 times never crashes", () => {
          let lastWall = 1000000;
          let lastMono = 50000;
          for (let i = 0; i < 500; i++) {
            const direction = i % 2 === 0 ? 1 : -1;
            const jumpMs = direction * (Math.random() * 60000);
            const realMs = Math.random() * 2000;
            const nowWall = lastWall + jumpMs;
            const nowMono = lastMono + realMs;
            const r = simulateDrift(lastWall, lastMono, nowWall, nowMono);
            assert(["NONE", "IDLE_LOCK", "ANCHOR_SHIFT"].includes(r));
            lastWall = nowWall;
            lastMono = nowMono;
          }
        });

        it("Monotonic clock perfectly tracks wall → always NONE (10000 ticks)", () => {
          let wall = 1000000;
          let mono = 50000;
          for (let i = 0; i < 10000; i++) {
            const advance = 1000; // 1s ticks
            wall += advance;
            mono += advance;
            const r = simulateDrift(wall - advance, mono - advance, wall, mono);
            assertEqual(r, "NONE");
          }
        });

        it("Gradual NTP drift (50ms/tick for 200 ticks) → stays in deadzone until tick ~100", () => {
          let wall = 1000000;
          let mono = 50000;
          let firstShift = -1;
          for (let i = 0; i < 200; i++) {
            const realAdvance = 1000;
            const wallAdvance = 1050; // 50ms drift per tick
            const r = simulateDrift(1000000, 50000, wall + wallAdvance, mono + realAdvance);
            if (r !== "NONE" && firstShift === -1) {
              firstShift = i;
            }
            wall += wallAdvance;
            mono += realAdvance;
          }
          // Cumulative drift = 50ms * N ticks. Deadzone = 5000ms. So ~100 ticks to trigger.
          assertApprox(firstShift, 100, 5, "Should trigger around tick 100");
        });
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 35. ACTIVE LEASE PROTOCOL & MULTI-TAB CONCURRENCY (BRUTALLY RIGOROUS)
      // ═══════════════════════════════════════════════════════════════════════
      describe("Active Lease Protocol & Concurrency Lockout", () => {
        const LEASE_KEY = "production_active_lease_v2";
        const STAGING_KEY = "production_staging_lease_v2";
        const STATE_KEY = "production_tracker_state_v2";

        let mockStorage = {};
        const fakeStore = {
          getItem: (key) => mockStorage[key] || null,
          setItem: (key, val) => {
            mockStorage[key] = String(val);
          },
          clear: () => {
            mockStorage = {};
          },
        };

        function checkLeaseStateSim(instanceId, isTabConflict, state, store = fakeStore) {
          try {
            const leaseStr = store.getItem(LEASE_KEY);
            if (!leaseStr) return { isTabConflict, currentMode: state.currentMode };
            const lease = JSON.parse(leaseStr);
            const now = Date.now();
            let newConflict = isTabConflict;
            let newMode = state.currentMode;

            if (lease.ownerId && lease.ownerId !== instanceId) {
              if (now - lease.lastHeartbeat < 3000) {
                if (!isTabConflict) {
                  newConflict = true;
                  newMode = null;
                }
              }
            } else if (lease.ownerId === instanceId) {
              if (isTabConflict) {
                newConflict = false;
              }
            }
            return { isTabConflict: newConflict, currentMode: newMode };
          } catch (e) {
            return { isTabConflict, currentMode: state.currentMode };
          }
        }

        function acquireLeaseSim(instanceId, store = fakeStore) {
          store.setItem(STAGING_KEY, instanceId);
          const stagingId = store.getItem(STAGING_KEY);
          if (stagingId === instanceId) {
            const lease = {
              ownerId: instanceId,
              lastHeartbeat: Date.now(),
              generationCounter: 1,
            };
            store.setItem(LEASE_KEY, JSON.stringify(lease));
            return { acquired: true, isTabConflict: false };
          }
          return { acquired: false, isTabConflict: true };
        }

        function renewLeaseSim(instanceId, isTabConflict, store = fakeStore) {
          if (isTabConflict) return false;
          try {
            const leaseStr = store.getItem(LEASE_KEY);
            let gen = 1;
            if (leaseStr) {
              const currentLease = JSON.parse(leaseStr);
              if (currentLease.ownerId && currentLease.ownerId !== instanceId) {
                return false;
              }
              gen = (currentLease.generationCounter || 0) + 1;
            }
            const lease = {
              ownerId: instanceId,
              lastHeartbeat: Date.now(),
              generationCounter: gen,
            };
            store.setItem(LEASE_KEY, JSON.stringify(lease));
            return true;
          } catch (e) {
            return false;
          }
        }

        function saveStateSim(isConflict, state, store = fakeStore) {
          if (isConflict) return false;
          store.setItem(STATE_KEY, JSON.stringify(state));
          return true;
        }

        it("isTabConflict completely halts tick() execution", () => {
          let tickRan = false;
          function tick(isConflict) {
            if (isConflict) return;
            tickRan = true;
          }
          tick(true);
          assert(!tickRan, "Tick must immediately abort");
          tick(false);
          assert(tickRan, "Tick resumes when conflict resolves");
        });

        it("isTabConflict completely halts handleWakeUpRecovery() execution", () => {
          let recoveryRan = false;
          function handleWakeUpRecovery(isConflict) {
            if (isConflict) return;
            recoveryRan = true;
          }
          handleWakeUpRecovery(true);
          assert(!recoveryRan, "Recovery must immediately abort");
          handleWakeUpRecovery(false);
          assert(recoveryRan, "Recovery resumes when conflict resolves");
        });

        it("Acquires lease successfully when no contention exists", () => {
          fakeStore.clear();
          const id = "tab_master";
          const res = acquireLeaseSim(id);
          assertEqual(res.acquired, true);
          assertEqual(res.isTabConflict, false);

          const lease = JSON.parse(fakeStore.getItem(LEASE_KEY));
          assertEqual(lease.ownerId, id);
          assertEqual(lease.generationCounter, 1);
        });

        it("Fails lease acquisition when pre-empted in staging (Split-Brain prevention)", () => {
          fakeStore.clear();
          const firstTab = "tab_A";
          const secondTab = "tab_B";

          fakeStore.setItem(STAGING_KEY, firstTab);
          fakeStore.setItem(STAGING_KEY, secondTab);

          const stagingIdForA = fakeStore.getItem(STAGING_KEY);
          assertEqual(stagingIdForA, secondTab);

          const resA = { acquired: false, isTabConflict: true };
          assertEqual(resA.acquired, false);
          assertEqual(resA.isTabConflict, true);

          const resB = acquireLeaseSim(secondTab);
          assertEqual(resB.acquired, true);
          assertEqual(resB.isTabConflict, false);
        });

        it("Evicts active tab immediately when lease ownership changes", () => {
          fakeStore.clear();
          const activeTabId = "tab_A";
          const newTabId = "tab_B";

          acquireLeaseSim(activeTabId);

          const stateA = { currentMode: "work" };
          let conflictA = false;

          const lease = {
            ownerId: newTabId,
            lastHeartbeat: Date.now(),
            generationCounter: 2,
          };
          fakeStore.setItem(LEASE_KEY, JSON.stringify(lease));

          const res = checkLeaseStateSim(activeTabId, conflictA, stateA);
          assertEqual(res.isTabConflict, true);
          assertEqual(res.currentMode, null, "Tracking mode must be reset to null (silently halted)");
        });

        it("Allows lease renewal to increment generation counter", () => {
          fakeStore.clear();
          const id = "tab_A";
          acquireLeaseSim(id);

          const renewed = renewLeaseSim(id, false);
          assertEqual(renewed, true);

          const lease = JSON.parse(fakeStore.getItem(LEASE_KEY));
          assertEqual(lease.generationCounter, 2);
        });

        it("Blocks lease renewal if the active tab has been evicted", () => {
          fakeStore.clear();
          const idA = "tab_A";
          const idB = "tab_B";

          acquireLeaseSim(idA);

          const leaseB = { ownerId: idB, lastHeartbeat: Date.now(), generationCounter: 1 };
          fakeStore.setItem(LEASE_KEY, JSON.stringify(leaseB));

          const renewed = renewLeaseSim(idA, false);
          assertEqual(renewed, false, "Evicted tab must fail to renew lease");
        });

        it("Strict Write Lockout: Evicted tab is blocked from writing to STATE_KEY", () => {
          fakeStore.clear();
          const evictedState = { workAccumulated: 0, currentMode: null };

          const result = saveStateSim(true, evictedState);
          assertEqual(result, false, "Save operation must be intercepted and canceled");
          assertEqual(fakeStore.getItem(STATE_KEY), null, "State key must remain unpolluted by evicted tab");
        });

        it("Staging backoff race safety under heavy concurrent thread load", () => {
          fakeStore.clear();
          const pool = Array.from({ length: 100 }, (_, i) => `tab_${i}`);

          pool.forEach((tabId) => {
            fakeStore.setItem(STAGING_KEY, tabId);
          });

          const winnerId = fakeStore.getItem(STAGING_KEY);
          assertEqual(winnerId, "tab_99");

          const res = acquireLeaseSim(winnerId);
          assertEqual(res.acquired, true);

          const lease = JSON.parse(fakeStore.getItem(LEASE_KEY));
          assertEqual(lease.ownerId, "tab_99");
        });

        it("Throttles background checking frequency according to page visibility state", () => {
          const checkFrequency = (hidden) => (hidden ? 15000 : 1000);
          assertEqual(checkFrequency(true), 15000, "Background tab check frequency must be relaxed to 15s");
          assertEqual(checkFrequency(false), 1000, "Foreground tab check frequency must be rapid (1s)");
        });

        it("Storage event handler ignores non-lease keys to avoid redundant deserializations", () => {
          let deserialized = false;
          const onStorageEvent = (key) => {
            if (key === LEASE_KEY) {
              deserialized = true;
            }
          };
          onStorageEvent("some_other_unrelated_key");
          assertEqual(deserialized, false);
          onStorageEvent(LEASE_KEY);
          assertEqual(deserialized, true);
        });
      });

      // ═══════════════════════════════════════════════════════════════════════
      // 38. PERSONAL TRACKER RESILIENCE: NTP DRIFT & STANDBY RECOVERY
      // ═══════════════════════════════════════════════════════════════════════
      describe("Personal Tracker Resilience: NTP Drift & Standby Recovery", () => {
        it("Active tracking remains stable during 100 consecutive random NTP clock adjustments", () => {
          let accumulatedWorkSec = 0;
          let lastMono = 100000;
          let lastWall = Date.now();

          // Simulating 100 cycles of active tracking where the Wall Clock shifts 
          // up or down randomly by up to ±2 seconds per second due to NTP background corrections
          for (let i = 0; i < 100; i++) {
            const actualElapsedMs = 1000; // Exactly 1 second of physical time passes
            const currentMono = lastMono + actualElapsedMs;

            // Random wall clock sync noise of up to ±2000ms
            const clockSyncShift = Math.random() * 4000 - 2000;
            const currentWall = lastWall + actualElapsedMs + clockSyncShift;

            // Core relative tracking check using Monotonic intervals
            const activeDelta = (currentMono - lastMono) / 1000;
            accumulatedWorkSec += activeDelta;

            lastMono = currentMono;
            lastWall = currentWall;
          }

          // Total physical work must equal exactly 100 seconds, completely ignoring NTP noise
          assertEqual(accumulatedWorkSec, 100, "Monotonic active accumulator failed to isolate NTP drift");
        });

        it("macOS/Linux Standby simulation: Monotonic clock pauses, Wall clock advances 1 hour", () => {
          const sleepDurationMs = 3600 * 1000; // 1 hour
          const startWall = Date.now();
          const startMono = performance.now();

          // System sleeps immediately...
          const wakeWall = startWall + sleepDurationMs;
          // On macOS/Linux, monotonic clock halts during sleep, showing only 10ms of drift during the wake cycle
          const wakeMono = startMono + 10;

          // Evaluate the timeline gap
          const wallDelta = wakeWall - startWall;
          const monoDelta = wakeMono - startMono;
          const discrepancy = Math.abs(wallDelta - monoDelta);

          // System must detect standby gap and identify it as an OS Sleep event requiring Idle Resolution
          assert(discrepancy > 5000, "Failed to detect discrepancy greater than 5s deadzone");
          assert(monoDelta < wallDelta - 30000, "Failed to identify sleep gap when monotonic lag exceeds 30s");
          assertEqual(wallDelta, sleepDurationMs, "Standby wall-clock delta calculation is incorrect");
        });

        it("Standby gap exactly matching the Idle Threshold triggers resolution flow", () => {
          const thresholdMins = 60;
          const thresholdMs = thresholdMins * 60 * 1000;

          const startWall = 5000000;
          const wakeWall = startWall + thresholdMs; // Exactly 60 minutes

          const startMono = 100000;
          const wakeMono = startMono + 500; // Monotonic paused during sleep

          const wallDelta = wakeWall - startWall;
          const monoDelta = wakeMono - startMono;

          const discrepancy = Math.abs(wallDelta - monoDelta);
          const isSuspension = monoDelta < wallDelta - 30000;

          assert(discrepancy > 5000, "Boundary discrepancy undetected");
          assert(isSuspension, "Boundary sleep state missed");
          assertEqual(wallDelta, thresholdMs, "Boundary threshold delta calculation mismatch");
        });

        it("Tab suspended: hidden, clock syncs backward by 10 minutes, tab restored", () => {
          const startWall = 10000000;
          const startMono = 500000;
          const tabHiddenAt = startWall;

          // User is away for 5 minutes (300,000ms), but clock adjusts backward by 10 minutes (-600,000ms)
          const wakeWall = startWall + 300000 - 600000; // Net negative wall-clock jump of 5 minutes
          const wakeMono = startMono + 300000; // Monotonic progresses normally because OS did not sleep

          const wallDelta = wakeWall - tabHiddenAt;
          const monoDelta = wakeMono - startMono;
          const discrepancy = Math.abs(wallDelta - monoDelta);

          let sessionAnchorWall = startWall - 200000; // Began 200s before suspension
          let correctedAnchor = sessionAnchorWall;

          // Re-alignment logic matching V2 absolute drift engine
          if (discrepancy > 5000) {
            if (monoDelta < wallDelta - 30000) {
              // Sleep triggers - handled by separate test case
            } else {
              correctedAnchor += wallDelta - monoDelta;
            }
          }

          // Anchor must shift backward to preserve elapsed work
          assertEqual(correctedAnchor, sessionAnchorWall - 600000, "Failed to correctly realign wall anchor during clock rollback");

          const elapsedWorkSec = (wakeWall - correctedAnchor) / 1000;
          assertEqual(elapsedWorkSec, 500, "Elapsed work calculation corrupted by clock rollback");
        });

        it("Standby resolution prevents negative gap calculations during backward clock adjustments", () => {
          const startWall = 20000000;
          const lastHeartbeat = startWall;

          // Computer goes to sleep. While asleep, OS clock falls back by 2 hours.
          // User wakes computer up 1 hour later. Net wall time is -1 hour.
          const wakeWall = startWall + (1 * 3600 * 1000) - (2 * 3600 * 1000);

          // Calculate raw idle duration
          const totalIdleMs = wakeWall - lastHeartbeat;

          // Math.max must guard the calculation to prevent negative time from propagating
          const safeIdleSec = Math.max(0, totalIdleMs / 1000);
          assertEqual(safeIdleSec, 0, "Negative idle durations must resolve safely to 0 seconds to avoid log corruption");
        });

      // ═══════════════════════════════════════════════════════════════════════
      // 40. BRUTAL MULTI-DAY MIDNIGHT ROLLOVER UNDER SYSTEM TIME WARPS
      // ═══════════════════════════════════════════════════════════════════════
      describe("Brutal Multi-Day Midnight Rollover under System Time Warps", () => {
        function simulateMidnightResetLoop(initialState, currentDatePST, logTargetArray) {
          let loopState = { ...initialState };
          let safetyCounter = 0;

          while (loopState.activeDate !== currentDatePST && safetyCounter < 31) {
            safetyCounter++;
            const hasAccumulatedWork = loopState.workAccumulated +
              (loopState.currentMode === "work" && loopState.sessionAnchorWall !== null ? 10 : 0);

            if (loopState.currentMode === null && hasAccumulatedWork < 1) {
              const [m, d, y] = loopState.activeDate.split("/");
              const nextDayObj = new Date(Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 12));
              const nm = String(nextDayObj.getUTCMonth() + 1).padStart(2, "0");
              const nd = String(nextDayObj.getUTCDate()).padStart(2, "0");
              const ny = String(nextDayObj.getUTCFullYear()).slice(-2);
              loopState.activeDate = `${nm}/${nd}/${ny}`;
            } else {
              // Simulated Universal Midnight Save
              const activeMode = loopState.currentMode;
              const [m, d, y] = loopState.activeDate.split("/");
              const midnightMs = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 8, 0, 0); // Simulated boundary

              if (loopState.workAccumulated > 0) {
                logTargetArray.push({
                  date: loopState.activeDate,
                  workSec: loopState.workAccumulated,
                  breakSec: loopState.breakAccumulated,
                  notes: "Auto-submitted (Midnight Reset)"
                });
              }

              const nextDayObj = new Date(Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 12));
              const nm = String(nextDayObj.getUTCMonth() + 1).padStart(2, "0");
              const nd = String(nextDayObj.getUTCDate()).padStart(2, "0");
              const ny = String(nextDayObj.getUTCFullYear()).slice(-2);

              loopState.workAccumulated = 0;
              loopState.breakAccumulated = 0;
              loopState.activeDate = `${nm}/${nd}/${ny}`;

              if (activeMode !== null) {
                loopState.currentMode = activeMode;
                loopState.loginTimestamp = midnightMs;
                loopState.sessionAnchorWall = midnightMs;
              } else {
                loopState.sessionAnchorWall = null;
                loopState.loginTimestamp = null;
              }
            }

            if (safetyCounter >= 31) {
              loopState.activeDate = currentDatePST;
              break;
            }
          }
          return { finalState: loopState, iterations: safetyCounter };
        }

        it("Rollover safety ceiling handles extreme future time jump (e.g. 50 days) without thread lock", () => {
          const startingState = {
            activeDate: "05/01/26",
            workAccumulated: 3600,
            breakAccumulated: 600,
            currentMode: "work",
            sessionAnchorWall: Date.now() - 3600000,
            loginTimestamp: Date.now() - 4200000
          };
          const savedLogs = [];
          // Clock leaped to June 25th (55 days in the future)
          const result = simulateMidnightResetLoop(startingState, "06/25/26", savedLogs);

          assertEqual(result.iterations, 31, "Safety block must enforce maximum 31 iterations");
          assertEqual(savedLogs.length, 1, "Only first day of active work should yield auto-saved log entry");
          assertEqual(result.finalState.workAccumulated, 0, "Accumulators must reset after safety limit is triggered");
        });

        it("Rollover loop with zero active mode advances dates seamlessly without writing empty logs", () => {
          const startingState = {
            activeDate: "05/01/26",
            workAccumulated: 0,
            breakAccumulated: 0,
            currentMode: null,
            sessionAnchorWall: null,
            loginTimestamp: null
          };
          const savedLogs = [];
          const result = simulateMidnightResetLoop(startingState, "05/05/26", savedLogs);

          assertEqual(result.iterations, 4, "Must complete precisely 4 iterations");
          assertEqual(result.finalState.activeDate, "05/05/26");
          assertEqual(savedLogs.length, 0, "No blank logs should be written");
        });
      });

      // ═══════════════════════════════════════════════════════════════════════
      describe("High-DPI Scrolling & Fractional Viewport Zoom Math", () => {
        function computeVisibleIndices(scrollTop, viewportHeight, baseFontSize, totalItems) {
          const itemHeight = 4.8 * baseFontSize;
          const overscan = 5;

          const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - overscan);
          const endIndex = Math.min(
            totalItems - 1,
            Math.ceil((scrollTop + viewportHeight) / itemHeight) + overscan
          );
          return { startIndex, endIndex, itemHeight };
        }

        it("Overscan handles high-DPI fractional scrolling offsets smoothly", () => {
          const res = computeVisibleIndices(150.37, 400, 16, 100);
          assertEqual(res.startIndex, 0);
          assert(res.endIndex > 5);
        });

        it("Maintains layout computation integrity during extreme browser zoom scales (e.g. 500% zoom)", () => {
          const zoomResult = computeVisibleIndices(1000, 600, 80, 20);
          assertEqual(zoomResult.itemHeight, 384);
          assert(zoomResult.startIndex >= 0);
          assert(zoomResult.endIndex < 20);
        });

        it("Maintains calculations safely under near-zero scale parameters (e.g. 1px base size)", () => {
          const zoomResult = computeVisibleIndices(50, 200, 1, 1000);
          assertEqual(zoomResult.itemHeight, 4.8);
          assert(zoomResult.startIndex < zoomResult.endIndex);
        });
      });

            0

          };

          if (state.activeDate !== targetDate) {
            if (
              state.idleLock &&
              state.preIdleMode !== null &&
              state.idleStart < midnightMs
            ) {
              const preMidnightIdleSec = (midnightMs - state.idleStart) / 1000;
              state.workAccumulated += preMidnightIdleSec;

              savedLogs.push({
                date: state.activeDate,
                workSec: state.workAccumulated,
                notes: "Auto-submitted (Midnight Reset)"

              state.workAccumulated = 0;
              state.activeDate = targetDate;

            }

          assertEqual(state.idleLock, true, "Idle lock must remain active");
          assertEqual(

            midnightMs,
            "Idle start must align to midnight of the new day"

          assertEqual(savedLogs.length, 1);
          assertEqual(

        });
