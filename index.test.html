      });
      // ═══════════════════════════════════════════════════════════════════════
      // BUG REPRO: MIDNIGHT ROLLOVER + OS SLEEP OVERLAP
      // ═══════════════════════════════════════════════════════════════════════
      describe("Bug Repro: Midnight Rollover + OS Sleep Overlap", () => {
        it("Replicates user scenario: Lid closed before midnight, waking up after", () => {
          // Setup initial state: Started at 9:51:06 PM on 05/28/26
          const baseDate = "05/28/26";
          const targetDate = "05/29/26";
          const [m, d, y] = baseDate.split("/");

          // 09:51:06 PM PST
          const startWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d), 21 + 7, 51, 6);
          // 12:00:00 AM PST (Midnight boundary)
          const midnightWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 7, 0, 0);
          // 01:00:00 AM PST (Wake up time)
          const wakeWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 8, 0, 0);

          let state = {
            activeDate: baseDate,
            currentMode: "work",
            sessionAnchorWall: startWall,
            loginTimestamp: startWall,
            workAccumulated: 0,
            idleLock: false,
            idleStart: null,
            preIdleMode: null
          };

          const savedLogs = [];

          // 1. System ticks normally until 9:59 PM, then lid closed (sleep)
          const lidCloseWall = startWall + (8 * 60 * 1000); // 9:59 PM
          state.workAccumulated += (lidCloseWall - startWall) / 1000;

          // 2. System wakes up at 1:00 AM. Drift engine detects >30s gap.
          state.preIdleMode = state.currentMode;
          state.currentMode = null;
          state.idleLock = true;
          state.idleStart = lidCloseWall; // OS sleep lock anchor

          // 3. Simulated Midnight Rollover Loop (App's exact fixed logic)
          if (state.activeDate !== targetDate) {
            if (state.idleLock && state.preIdleMode !== null && state.idleStart < midnightWall) {
              // Removed pre-midnight idle extraction to prevent 24h coma logs

              // Save Thursday chunk
              savedLogs.push({
                date: state.activeDate,
                workSec: state.workAccumulated,
                loginTimestamp: state.loginTimestamp
              });

              // RESET FOR NEW DAY
              state.workAccumulated = 0;
              state.activeDate = targetDate;
              state.idleStart = midnightWall; // Anchor moved to midnight

              // FIXED: Now we correctly align login timestamp to midnight for the new day
              if (state.loginTimestamp) {
                state.loginTimestamp = midnightWall;
              }
            }
          }

          // 4. User clicks "Log as Work" at 1:00 AM on the idle popup
          state.idleLock = false;
          state.currentMode = state.preIdleMode;
          state.preIdleMode = null;
          const postMidnightIdleSec = (wakeWall - state.idleStart) / 1000;
          state.workAccumulated += postMidnightIdleSec;
          state.sessionAnchorWall = wakeWall; // Anchor resumes from wake

          // 5. User stops timer at 02:46:47 AM
          const stopWall = midnightWall + (2 * 3600 + 46 * 60 + 47) * 1000;
          state.workAccumulated += (stopWall - wakeWall) / 1000;

          // Save Friday chunk
          savedLogs.push({
            date: state.activeDate,
            workSec: state.workAccumulated,
            loginTimestamp: state.loginTimestamp // THIS WILL BE WRONG
          });

          // VERIFICATIONS
          assertEqual(savedLogs.length, 2, "Should create exactly 2 logs");

          // First log (Thursday) 
          assertEqual(savedLogs[0].date, "05/28/26");

          // Second log (Friday)
          assertEqual(savedLogs[1].date, "05/29/26");

          // THIS ASSERTION HIGHLIGHTS THE BUG
          // If the bug exists, this will fail because loginTimestamp is still 9:51 PM
          assertEqual(
            savedLogs[1].loginTimestamp,
            midnightWall,
            "LOGICAL FLAW: loginTimestamp was not reset to 12:00:00 AM for the next day, causing overlaps!"
          );
        });

        it("Brutal: 3-Day OS Sleep Coma (Multi-rollover with pre-midnight idle)", () => {
          const baseDate = "05/25/26"; // Monday
          const targetDate = "05/28/26"; // Thursday
          const [m, d, y] = baseDate.split("/");

          // 11:00:00 PM PST Monday
          const startWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d), 23 + 7, 0, 0);

          let state = {
            activeDate: baseDate,
            currentMode: "work",
            sessionAnchorWall: startWall,
            loginTimestamp: startWall,
            workAccumulated: 0,
            idleLock: false,
            idleStart: null,
            preIdleMode: null
          };

          const savedLogs = [];

          // Sleep at 11:30 PM Monday
          const lidCloseWall = startWall + (30 * 60 * 1000);
          state.workAccumulated += (lidCloseWall - startWall) / 1000;

          state.preIdleMode = state.currentMode;
          state.currentMode = null;
          state.idleLock = true;
          state.idleStart = lidCloseWall;

          // Loop simulation across 3 days
          let safetyCounter = 0;
          while (state.activeDate !== targetDate && safetyCounter < 31) {
            safetyCounter++;

            const [curM, curD, curY] = state.activeDate.split("/");
            const midnightWall = Date.UTC(2000 + parseInt(curY), parseInt(curM) - 1, parseInt(curD) + 1, 7, 0, 0);

            if (state.idleLock && state.preIdleMode !== null && state.idleStart < midnightWall) {
              // Removed pre-midnight idle extraction

              if (state.workAccumulated > 0) {
                savedLogs.push({
                  date: state.activeDate,
                  workSec: state.workAccumulated,
                  loginTimestamp: state.loginTimestamp
                });
              }

              state.workAccumulated = 0;

              const nextDayObj = new Date(Date.UTC(2000 + parseInt(curY), parseInt(curM) - 1, parseInt(curD) + 1, 12, 0, 0));
              const nm = String(nextDayObj.getUTCMonth() + 1).padStart(2, "0");
              const nd = String(nextDayObj.getUTCDate()).padStart(2, "0");
              const ny = String(nextDayObj.getUTCFullYear()).slice(-2);
              state.activeDate = `${nm}/${nd}/${ny}`;

              state.idleStart = midnightWall;
              if (state.loginTimestamp) {
                state.loginTimestamp = midnightWall;
              }
            }
          }

          assertEqual(safetyCounter, 3);
          assertEqual(savedLogs.length, 1, "Only Monday should have a log (pre-idle work). Tue/Wed are 0s and skipped");
          assertEqual(savedLogs[0].date, "05/25/26");
          assertEqual(savedLogs[0].workSec, 1800, "30m work before idle");
          assertEqual(state.activeDate, "05/28/26", "Must cleanly arrive at Thursday");
          assertEqual(state.loginTimestamp, Date.UTC(2026, 4, 28, 7, 0, 0), "Login timestamp must be midnight Thursday");
        });

        it("Brutal: Discarding post-midnight idle after an active rollover", () => {
          // Tests behavior of discard logic when the pre-midnight portion was already logged
          const baseDate = "05/28/26";
          const [m, d, y] = baseDate.split("/");

          // 11:00 PM PST
          const startWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d), 23 + 7, 0, 0);
          const midnightWall = Date.UTC(2000 + parseInt(y), parseInt(m) - 1, parseInt(d) + 1, 7, 0, 0);

          let state = {
            activeDate: baseDate,
            currentMode: "work",
            sessionAnchorWall: startWall,
            loginTimestamp: startWall,
            workAccumulated: 0,
            idleLock: false,
            idleStart: null,
            preIdleMode: null
          };

          const savedLogs = [];

          // Lid closes at 11:30 PM
          const lidCloseWall = startWall + 1800000;
          state.workAccumulated += 1800; // 30m

          state.preIdleMode = state.currentMode;
          state.currentMode = null;
          state.idleLock = true;
          state.idleStart = lidCloseWall;

          // Midnight rollover occurs
          // Removed pre-midnight idle extraction

          savedLogs.push({
            date: state.activeDate,
            workSec: state.workAccumulated
          });

          state.workAccumulated = 0;
          state.activeDate = "05/29/26";
          state.idleStart = midnightWall;
          state.loginTimestamp = midnightWall;

          // Wakes up at 1:00 AM Friday
          const wakeWall = midnightWall + 3600000;

          // User clicks DISCARD instead of Log As Work
          // resolveIdle("discard") runs:
          const totalIdleSeconds = (wakeWall - state.idleStart) / 1000;
          // In choice === "discard", we DO NOT add totalIdleSeconds to workAccumulated
          state.idleLock = false;
          state.idleStart = null;
          state.sessionAnchorWall = wakeWall;
          state.currentMode = "work"; // Resumes preIdleMode

          assertEqual(savedLogs.length, 1);
          assertEqual(savedLogs[0].workSec, 1800, "Only pre-idle work is preserved. Pre-midnight idle is lost to avoid 24h spam");
          assertEqual(state.workAccumulated, 0, "Friday starts at 0 work because post-midnight idle (1hr) was discarded");
        });
      });


    // =========================================================================
      // -----------------------------------------------------------------------
      // NEW BRUTAL AUDIT TESTS
      // -----------------------------------------------------------------------

      describe("Storage Quota & Blocked APIs", () => {
        it("gracefully degrades when localStorage.setItem throws QuotaExceededError", () => {
          let thrown = false;
          const originalSet = Storage.prototype.setItem || function(){};
          try {
            Storage.prototype.setItem = function(key, val) {
              thrown = true;
              throw new DOMException("Quota exceeded", "QuotaExceededError");
            };
            // Mock safeGetLocalStorage to ensure it catches the error
            function safeSetLocalStorageMock(key, val) {
              try {
                localStorage.setItem(key, val);
              } catch (e) {
                return false;
              }
              return true;
            }
            const success = safeSetLocalStorageMock("testKey", "testVal");
            assertEqual(success, false, "Must handle quota exception gracefully");
            assert(thrown, "Expected mock to throw");
          } finally {
            Storage.prototype.setItem = originalSet;
          }
        });
      });

      describe("Cross-Tab Concurrency & Lease Lock", () => {
        it("handles rapid conflict generation without crashing", () => {
          let conflict = false;
          let msgs = 0;
          
          for (let i = 0; i < 10000; i++) {
             if (!conflict) {
               conflict = true;
               msgs++;
             }
             if (i % 2 === 0) {
                conflict = false; 
             }
          }
          assert(msgs > 0, "Stress test finished without locking up loop");
        });
      });

      describe("Idle Overlap Security", () => {
        it("negative overlap yields safe zero", () => {
          const overlap = -500;
          const safeSec = Math.max(0, overlap);
          assertEqual(safeSec, 0, "Negative overlap must be clamped");
        });
        it("microsecond rapid toggling does not accumulate infinite work", () => {
          let testWork = 0;
          for (let i = 0; i < 50000; i++) {
             let add = (i % 2 === 0) ? 0.0001 : -0.0001; 
             testWork = Math.max(0, testWork + add);
          }
          assert(testWork < 1, "Work should not inflate due to micro-toggles");
        });
      });

      describe("UX & Formatting XSS Vulnerabilities", () => {
        it("Zero-width characters do not bypass HTML escape", () => {
          const zws = "\u200B\u200B<script>alert(1)<\/script>\u200B";
          const res = escapeHTML(zws);
          assert(!res.includes("<script>"), "ZWS should not hide tags");
          assert(res.includes("&lt;script&gt;"), "Tags must be escaped");
        });
        it("Right-to-left override character is escaped or safely passed", () => {
          const rlo = "\u202E<img src=x onerror=a>";
          const res = escapeHTML(rlo);
          assert(!res.includes("<img"), "Must escape tag despite RLO");
        });
        it("Extremely long repeated Zalgo text", () => {
          const zalgo = "h?e?l?l?o?".repeat(2000);
          const res = escapeHTML(zalgo);
          assert(res.length > 10000, "Should handle long zalgo strings without blowing stack");
        });
      });

    }

    // =========================================================================
    // RENDERER
    // =========================================================================
    function renderResults() {
      const container = document.getElementById("results");
      let totalPass = 0,
        totalFail = 0;

      sections.forEach((sec) => {
        totalPass += sec.pass;
        totalFail += sec.fail;
      });

      const total = totalPass + totalFail;
      document.getElementById("total-count").textContent = total;
      document.getElementById("pass-count").textContent = totalPass;
      document.getElementById("fail-count").textContent = totalFail;

      const pct = total > 0 ? (totalPass / total) * 100 : 0;
      const fill = document.getElementById("progress-fill");
      fill.style.width = pct + "%";
      fill.style.background =
        totalFail === 0 ? "#4ade80" : pct > 80 ? "#fbbf24" : "#f87171";

      let html = "";
      sections.forEach((sec, si) => {
        const allPass = sec.fail === 0;
        const badgeClass = allPass ? "badge-pass" : "badge-fail";
        const badgeText = allPass
          ? `✓ ${sec.pass} passed`
          : `✗ ${sec.fail} failed / ${sec.pass + sec.fail} total`;
        const isOpen = sec.fail > 0 ? " open" : "";

        html += `<div class="section">
          <div class="section-header" onclick="this.nextElementSibling.classList.toggle('open')">
            <span class="title">${escapeHTML(sec.name)}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="section-body${isOpen}">`;

        sec.tests.forEach((test) => {
          const icon = test.passed ? "✓" : "✗";
          const iconClass = test.passed ? "pass" : "fail";
          const detail = test.detail
            ? `<span class="test-detail">${escapeHTML(test.detail)}</span>`
            : "";
          html += `<div class="test-row">
            <span class="test-icon ${iconClass}">${icon}</span>
            <span class="test-name">${escapeHTML(test.name)}</span>
            ${detail}
          </div>`;
        });

        html += `</div></div>`;
      });

      container.innerHTML = html;
    }

    // =========================================================================
    // MASTER RUN TRIGGER
    // =========================================================================
    function runAllTests() {
      const btn = document.getElementById("run-btn");
      btn.disabled = true;
      btn.textContent = "⏳ Running...";

      sections.length = 0;
      document.getElementById("results").innerHTML = "";
      lcgSeed = 123456789; // Reset seed to guarantee identical test generation on repeat runs

      const startTime = performance.now();

      setTimeout(() => {
        try {
          defineAllTests();
          const elapsed = performance.now() - startTime;
          document.getElementById("duration").textContent =
            elapsed.toFixed(1) + "ms";
          renderResults();
        } catch (err) {
          document.getElementById(
            "results"
          ).innerHTML = `<div style="color:red; padding:20px; font-size:18px;">CRITICAL ERROR: ${err.message}<br><pre>${err.stack}</pre></div>`;
        }
        btn.disabled = false;
        btn.textContent = "▶ Run All Tests";
      }, 50);
    }
